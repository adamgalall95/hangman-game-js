<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangman</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./js/app.js" defer></script>
  </head>
  <body>
    <main class="game">
      <header class="message">
        <span class="message__text">Hangman Game</span>
      </header>
      <div class="game__content">
        <div class="hangman">
          <img
            class="hangman__image"
            src="./assets/img/h-0.jpg"
            alt="Current hangman drawing"
          />
        </div>
        <div class="game-stats">
          <button type="button" class="btn game-stats__play-btn">
            Play Again
          </button>
          <span class="game-stats__wins">Wins : 0</span>
          <span class="game-stats__losses">Losses : 0</span>
        </div>
      </div>
      <div class="underscores">
        <span>_</span>
      </div>
      <section class="keyboard">
        <button type="button" class="btn keyboard__btn">q</button>
        <button type="button" class="btn keyboard__btn">w</button>
        <button type="button" class="btn keyboard__btn">e</button>
        <button type="button" class="btn keyboard__btn">r</button>
        <button type="button" class="btn keyboard__btn">t</button>
        <button type="button" class="btn keyboard__btn">y</button>
        <button type="button" class="btn keyboard__btn">u</button>
        <button type="button" class="btn keyboard__btn">i</button>
        <button type="button" class="btn keyboard__btn">o</button>
        <button type="button" class="btn keyboard__btn">p</button>
        <button type="button" class="btn keyboard__btn">a</button>
        <button type="button" class="btn keyboard__btn">s</button>
        <button type="button" class="btn keyboard__btn">d</button>
        <button type="button" class="btn keyboard__btn">f</button>
        <button type="button" class="btn keyboard__btn">g</button>
        <button type="button" class="btn keyboard__btn">h</button>
        <button type="button" class="btn keyboard__btn">j</button>
        <button type="button" class="btn keyboard__btn">k</button>
        <button type="button" class="btn keyboard__btn">l</button>
        <button type="button" class="btn keyboard__btn">z</button>
        <button type="button" class="btn keyboard__btn">x</button>
        <button type="button" class="btn keyboard__btn">c</button>
        <button type="button" class="btn keyboard__btn">v</button>
        <button type="button" class="btn keyboard__btn">b</button>
        <button type="button" class="btn keyboard__btn">n</button>
        <button type="button" class="btn keyboard__btn">m</button>
      </section>
    </main>
  </body>
</html>
